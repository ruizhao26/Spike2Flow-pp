data:
  rssf_path: /data/rzhao/rssf_pp
  image_size_json: datasets/img_size.json
  phm_path: /data/rzhao/scflow_dataset/phm

loader:
  n_epochs: 120
  batch_size: 6
  crop_size: [384, 384]
  augment: ['Horizontal', 'Vertical']
  pair_step: 1
  do_flip: True
  seed: 6351

model:
  flow_weight_decay: 0.0004
  flow_bias_decay: 0.0

train:
  print_freq: 100
  mixed_precision: True
  vis_freq: 20

optimizer:
  solver: Adam
  lr: 0.0001
  momentum: 0.9
  beta: 0.999
